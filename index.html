<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiderman UI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="card">
        <!-- Navigation -->
        <nav>
            <div class="logo">
                <img src="images/spiderlogo.png" alt="logo">
            </div>
            <div class="menu">
                <i class="fa-regular fa-user"></i>
                <span class="divider"></span>
                <span>EN</span>
                <span class="divider"></span>
                <i class="fa-solid fa-magnifying-glass"></i>
                <span class="divider"></span>
                <i class="fa-solid fa-bars"></i>
            </div>
        </nav>

        <!-- Left Social Media Icons -->
        <div class="social">
            <a href="#" class="fab fa-linkedin-in"></a>
            <a href="#" class="fab fa-facebook-f"></a>
            <a href="#" class="fab fa-twitter"></a>
        </div>

        <!-- Hero -->
        <div class="hero">
            <img src="images/spiderman.png" alt="spider-man" class="spidey">
            <div class="text">
                <h1>SPIDERMAN</h1>
            </div>
        </div>
        
        <!-- Side Arrow -->
        <div class="carousel-arrow left">
            <i class="fa-solid fa-chevron-left"></i>
        </div>
        <div class="carousel-arrow right">
            <i class="fa-solid fa-chevron-right"></i>
        </div>

        <!-- Info Cards -->
        <div class="info-cards">
            <div class="info-card">
                <div class="info-number">01</div>
                    <div class="info-text">
                        <h4>Awards</h4>
                        <p>Recognized globally for herioc service and protecting the city.</p>
                    </div>
            </div> 
            <div class="info-card">
                <div class="info-number">02</div>
                    <div class="info-text">
                        <h4>Services</h4>
                        <p>Providing protection and rapid response against threats.</p>
                    </div>
            </div> 
            <div class="info-card">
                <div class="info-number">03</div>
                    <div class="info-text">
                        <h4>Team</h4>
                        <p>Recognized globally for herioc service and protecting the city.</p>
                    </div>
            </div>  
        </div>

        
    </div>
    
</body>
</html>
